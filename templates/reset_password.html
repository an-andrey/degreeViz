{% extends "base.html" %} {% block title %}Reset Password - DegreeViz{% endblock
%} {% block content %}
<script>
  // Swap out the default narrow container for our new centered layout
  document.querySelector("main").className = "landing-container";
</script>

<div class="landing-cards">
  <div class="form-card single-card">
    <h3>Set New Password</h3>

    <form id="resetPasswordForm" onsubmit="event.preventDefault()">
      <label for="newPassword">New Password:</label>
      <input type="password" id="newPassword" placeholder="••••••••" required />

      <p
        id="resetMessage"
        class="auth-message"
        style="margin-top: 0; margin-bottom: 15px; text-align: center"
      ></p>

      <div class="card-action">
        <input
          type="submit"
          id="updatePasswordBtn"
          value="Update Password"
          style="width: 100%; margin: 0; background-color: var(--mcgill-red)"
        />
      </div>
    </form>
  </div>
</div>
{% endblock %} {% block scripts %}
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const { supabase_url, supabase_key } = window.SUPABASE_CONFIG;
    const supabaseClient = window.supabase.createClient(
      supabase_url,
      supabase_key,
    );

    const resetForm = document.getElementById("resetPasswordForm");
    const newPasswordInput = document.getElementById("newPassword");
    const updateBtn = document.getElementById("updatePasswordBtn");
    const resetMessage = document.getElementById("resetMessage");

    resetForm.addEventListener("submit", async () => {
      const newPassword = newPasswordInput.value;

      updateBtn.disabled = true;
      updateBtn.value = "Updating...";
      resetMessage.style.color = "var(--text-main)";
      resetMessage.textContent = "Updating your password...";

      // Supabase automatically uses the secure token embedded in the URL
      const { data, error } = await supabaseClient.auth.updateUser({
        password: newPassword,
      });

      if (error) {
        resetMessage.style.color = "var(--error-text)";
        resetMessage.textContent = error.message;
        updateBtn.disabled = false;
        updateBtn.value = "Update Password";
      } else {
        resetMessage.style.color = "#28a745"; // Success green
        resetMessage.textContent =
          "Password updated successfully! Redirecting...";

        setTimeout(() => {
          window.location.href = "/";
        }, 2000);
      }
    });
  });
</script>
{% endblock %}
