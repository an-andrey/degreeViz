{% extends "base.html" %} {% block head %}
<script
  type="text/javascript"
  src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"
></script>
{% endblock %} {% block content %}
<script>
  document.querySelector(".page-container").classList.add("graph-wrapper");
</script>

<div class="workspace-container">
  <div class="tabs-header">
    <button class="tab-btn active" onclick="switchTab('graph')">
      Visual Graph
    </button>
    <button class="tab-btn" onclick="switchTab('sheet')">
      Sheet View (Beta)
    </button>
  </div>

  <div class="graph-wrapper">
    <div id="graph-content" class="tab-content active">
      <div class="custom-manipulation-buttons">
        <button id="saveGraphBtn">Save Graph to Profile</button>
        <a href="{{url_for('add_program_form')}}" style="text-decoration: none">
          <button id="addProgramToGraphBtn" type="button">
            Add Another Program to Graph
          </button>
        </a>
        <button
          id="undoBtn"
          class="action-button"
          disabled
          style="background-color: var(--text-muted)"
        >
          Undo
        </button>
        <button
          id="redoBtn"
          class="action-button"
          disabled
          style="background-color: var(--text-muted)"
        >
          Redo
        </button>
      </div>
      <div id="courseNetwork"></div>
    </div>

    <div id="sheet-content" class="tab-content">
      <div class="sheet-header">
        <h3>Semester Plan & Credits</h3>
        <div class="progress-hud">
          <span class="hud-stat"><strong>0 / 90</strong> Total Credits</span>
          <span class="hud-stat"><strong>0 / 76</strong> Major Credits</span>
        </div>
      </div>
      <div class="table-placeholder">
        <p
          style="color: var(--text-muted); text-align: center; padding: 40px 0"
        >
          <em>Data table will be injected here by Python...</em>
        </p>
      </div>
    </div>
  </div>
</div>

{% endblock %} {% block scripts %}
<script
  type="module"
  src="{{ url_for('static', filename='js/main.js') }}"
></script>

<script type="text/javascript">
    const prereqsData = {{ prereqs|tojson }};
    const detailsData = {{ details|tojson }};
    const serverScheduleId = {{ session.get('schedule_id') | tojson | safe }};

    function switchTab(targetTab) {
    // 1. Remove 'active' class from all buttons and content
    document
      .querySelectorAll(".tab-btn")
      .forEach((btn) => btn.classList.remove("active"));
    document
      .querySelectorAll(".tab-content")
      .forEach((content) => content.classList.remove("active"));

    // 2. Add 'active' class to the clicked button and its matching content
    document
      .querySelector(`[onclick="switchTab('${targetTab}')"]`)
      .classList.add("active");
    document.getElementById(`${targetTab}-content`).classList.add("active");
  }
</script>
{% endblock %}
